<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#2a1d4a"/>
      <stop offset="0.5" stop-color="#3a1d3f"/>
      <stop offset="1"   stop-color="#3d2a12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#8b5cf6"/>
      <stop offset="0.5" stop-color="#d946ef"/>
      <stop offset="1"   stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#g)"/>
  <rect x="0" y="296" width="1200" height="14" fill="url(#accent)" opacity="0.7"/>
  <!-- three orbs: a little pack, overlapping and translucent (the three dogs) -->
  <circle cx="470" cy="300" r="96" fill="#8b5cf6" opacity="0.45"/>
  <circle cx="600" cy="300" r="96" fill="#d946ef" opacity="0.45"/>
  <circle cx="730" cy="300" r="96" fill="#f59e0b" opacity="0.45"/>
  <!-- playful paw dots -->
  <g fill="#ededed" opacity="0.16">
    <circle cx="250" cy="180" r="10"/>
    <circle cx="292" cy="160" r="8"/>
    <circle cx="930" cy="430" r="10"/>
    <circle cx="972" cy="450" r="8"/>
    <circle cx="1012" cy="420" r="7"/>

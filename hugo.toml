# carriekroutil.com — Hugo + Hextra config (AR-1, AD-5, AD-10)
# TOML by architecture decision; baseURL/title reflect carriekroutil.com only — no retired-project branding.
baseURL = "https://carriekroutil.com/"
title = "carrie kroutil"

# Post content-model contract (Story 2.1, AD-3). A future `date` intentionally withholds
# a post until that date rather than vanishing silently; `draft: true` is the explicit
# withhold mechanism. This is also Hugo's default — set explicitly so the intent is visible.
buildFuture = false

# Discoverability (Story 5.1, FR-18): emit a crawler-facing robots.txt that allows indexing
# and points at the sitemap (template in layouts/robots.txt). Hugo generates sitemap.xml by
# default; the in-page `index, follow` robots meta is handled by Hextra in production builds.
enableRobotsTXT = true

# Hextra consumed as a Hugo Module, version-locked in go.mod (AD-10) — never vendored/edited in place (AD-5).
[module]
[[module.imports]]
path = "github.com/imfing/hextra"

# Only the lowercase `tags` taxonomy (drops Hugo's default `categories`); open taxonomy, authored lowercase.
[taxonomies]
tag = "tags"

# Syntax highlighting (Story 2.x polish): emit class-based markup, not inline styles.
# Hugo's default (noClasses=true) bakes the off-palette Monokai style straight onto
# each <pre> (background #272822), bypassing the theme. Class-based output defers to
# Hextra's own bundled chroma stylesheet (assets/css/chroma/*.css), whose code surface
# is a tint of the brand primary (fuchsia) and tracks the dark/light theme.
[markup]
[markup.highlight]
noClasses = false

[params]
# Avatar photo for the Home hero + About page (custom/avatar.html). Lives in static/,
# so the path is site-root-relative. Unset → falls back to the on-brand "CK" monogram.
avatar = "/carrie-avatar.jpg"

# Site-level description (Story 5.1, FR-18): the meta description + OG/Twitter description
# fallback for pages without their own (notably Home, which has no body summary). Per-post
# `description` front matter overrides this; the avatar doubles as the default share image.
description = "Carrie Kroutil's corner of the internet — notes on engineering leadership, building with AI, golf, and dogs."

# Readership analytics (Story 5.3, FR-14, NFR-3): GoatCounter count endpoint for the
# privacy-friendly page-view include (custom/analytics.html) — no cookies, no PII, no
# consent banner. Emitted in production builds only; local previews never count. Value is
# the full data-goatcounter URL from your GoatCounter site settings (Settings → "Site code").
goatcounter = "https://carrie.goatcounter.com/count"

[params.theme]
# Dark is the default paint + AA-guaranteed path; functional toggle/persistence is Story 1.4.
default = "dark"
displayToggle = true

[params.search]
enable = true
type = "flexsearch"
[params.search.flexsearch]
index = "content"
# One result per post. Hextra's search is built for docs and returns a separate
# result per matching heading/section, so a multi-heading post appeared several
# times for one query (e.g. "dogs" returned the same post 3×). This is a blog —
# cap to the single best-matching section so each post shows once. Full-content
# matching is unchanged; only the per-post result count is collapsed.
maxSectionResults = 1

# Suppress Hextra's "Powered by Hextra" credit — the footer is a single muted
# line with only GitHub/LinkedIn operable (Story 1.3, UX-DR9). Footer theme
# switches are already off by default (enableFooterSwitches=false in the module).
[params.footer]
displayPoweredBy = false

# Header right-side controls (Story 1.3, UX-DR6), rendered by Hextra in ascending
# weight order: Posts · About · search ⌕ · theme ☾ · GitHub · LinkedIn.
# Posts/About use literal URLs — those pages arrive in Epics 2/3; a literal URL
# avoids build-time pageRef validation against not-yet-existent content.
[[menu.main]]
name = "Posts"
url = "/posts/"
weight = 10

[[menu.main]]
name = "About"
url = "/about/"
weight = 20

[[menu.main]]
name = "Search"
weight = 30
[menu.main.params]
type = "search"

[[menu.main]]
name = "Theme"
weight = 40
[menu.main.params]
type = "theme-toggle"
label = false

[[menu.main]]
name = "GitHub"
url = "https://github.com/CarrieKroutil"
weight = 50
[menu.main.params]
icon = "github"

[[menu.main]]
name = "LinkedIn"
url = "https://www.linkedin.com/in/carriekroutil"
weight = 60
[menu.main.params]
icon = "linkedin"

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- carriekroutil.com favicon, styled to match the unblur icon: diagonal accent
       gradient on a rounded square, white CK monogram with a soft blurred ghost
       behind the sharp letters (the unblur effect). -->
  <defs>
    <linearGradient id="ck-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="ck-softblur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>
  </defs>

  <rect width="64" height="64" rx="14" ry="14" fill="url(#ck-bg)"/>

  <!-- Blurred CK ghost -->
  <text x="32" y="42.5" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-weight="800" font-size="30" letter-spacing="-2"
        fill="#ffffff" opacity="0.35" filter="url(#ck-softblur)">CK</text>

  <!-- Sharp CK on top -->
  <text x="32" y="42.5" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-weight="800" font-size="30" letter-spacing="-2"
        fill="#ffffff">CK</text>
</svg>
